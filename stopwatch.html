<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티니핑 스탑워치</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #ffe8f5 0%, #fff0e0 50%, #ffe8f5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Jua', sans-serif;
      overflow: hidden;
    }

    /* 배경 파티클 */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-item {
      position: absolute;
      bottom: -50px;
      animation: floatUp linear infinite;
      opacity: 0.4;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0.4; }
      100% { transform: translateY(-115vh) scale(0.8); opacity: 0; }
    }

    /* 메인 카드 */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      background: rgba(255,255,255,0.75);
      border-radius: 48px;
      box-shadow: 0 10px 50px rgba(255,150,180,0.28), 0 2px 12px rgba(255,200,220,0.3);
      backdrop-filter: blur(14px);
      border: 3px solid rgba(255,210,230,0.7);
      padding: 20px 28px 28px;
      min-width: 350px;
    }

    /* 캐릭터 영역 */
    .char-area {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
      animation: charBob 2.6s ease-in-out infinite;
    }

    @keyframes charBob {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-10px) rotate(1deg); }
    }

    h1 {
      font-size: 1.4rem;
      color: #e8006a;
      margin-bottom: 18px;
      text-shadow: 1px 2px 0 #ffbbcc;
      letter-spacing: 0.1em;
    }

    /* 링 */
    .ring-wrap {
      position: relative;
      width: 250px;
      height: 250px;
      margin: 0 auto 22px;
    }

    .ring-wrap > svg {
      transform: rotate(-90deg);
      filter: drop-shadow(0 0 10px rgba(255,100,160,0.4));
    }

    .ring-bg { fill: none; stroke: #ffe0ee; stroke-width: 10; }

    .ring-prog {
      fill: none;
      stroke: url(#happyGrad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 676;
      stroke-dashoffset: 676;
    }

    .time-box {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .time-icon { font-size: 1.5rem; margin-bottom: 4px; }

    .time-main {
      font-size: 2.7rem;
      color: #cc0055;
      text-shadow: 1px 1px 0 #ffbbcc;
      letter-spacing: 0.03em;
    }

    .time-ms { font-size: 1.2rem; color: #ff6699; margin-top: 4px; }

    /* 버튼 */
    .btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      margin-bottom: 22px;
    }

    button {
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      cursor: pointer;
      font-family: 'Jua', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: transform 0.12s, box-shadow 0.12s;
      width: 68px; height: 68px;
      font-size: 0.82rem;
      line-height: 1;
    }

    button:hover { transform: scale(1.07); }
    button:active { transform: scale(0.88) !important; }
    .btn-icon { font-size: 1.15rem; }

    #btn-start {
      width: 82px; height: 82px;
      background: linear-gradient(135deg, #ff80aa, #ff0066);
      color: #fff;
      box-shadow: 0 5px 20px rgba(255,0,100,0.4);
      font-size: 0.9rem;
    }

    #btn-start.running {
      background: linear-gradient(135deg, #ffaa55, #ff5500);
      box-shadow: 0 5px 20px rgba(255,100,0,0.4);
    }

    #btn-lap {
      background: linear-gradient(135deg, #ffddee, #ffbbdd);
      color: #cc0055;
      box-shadow: 0 4px 14px rgba(255,100,160,0.25);
    }

    #btn-reset {
      background: linear-gradient(135deg, #ffeecc, #ffdd99);
      color: #aa6600;
      box-shadow: 0 4px 14px rgba(255,180,50,0.25);
    }

    /* 랩 */
    .laps {
      width: 100%;
      max-height: 185px;
      overflow-y: auto;
      border-radius: 18px;
    }

    .laps::-webkit-scrollbar { width: 4px; }
    .laps::-webkit-scrollbar-thumb { background: #ffaacc; border-radius: 2px; }

    .lap-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px dashed #ffe0ee;
      font-size: 0.86rem;
      color: #cc3366;
      background: rgba(255,255,255,0.55);
      animation: popIn 0.22s cubic-bezier(.34,1.56,.64,1);
    }

    .lap-row:first-child { border-top: 1px dashed #ffe0ee; border-radius: 14px 14px 0 0; }

    .lap-num   { color: #ff3377; min-width: 66px; text-align: left; font-size: 0.88rem; }
    .lap-split { color: #cc8899; min-width: 90px; text-align: center; font-size: 0.78rem; }
    .lap-time  { min-width: 90px; text-align: right; }
    .lap-row.best  .lap-time { color: #22bb66; }
    .lap-row.worst .lap-time { color: #ff4455; }

    @keyframes popIn {
      from { opacity:0; transform:scale(0.82); }
      to   { opacity:1; transform:scale(1); }
    }

    /* 스파클 */
    .sparkle {
      position: fixed;
      pointer-events: none;
      animation: sparkOut 0.85s ease forwards;
      z-index: 999;
      font-size: 1.1rem;
    }

    @keyframes sparkOut {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
    }
  </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div class="card">

  <!-- 해피핑 SVG 캐릭터 -->
  <div class="char-area">
    <svg id="charSvg" xmlns="http://www.w3.org/2000/svg" width="150" height="140" viewBox="0 0 150 140">

      <!-- 날개 -->
      <ellipse cx="20" cy="75" rx="20" ry="30" fill="#ffccee" opacity="0.8" transform="rotate(-35 20 75)"/>
      <ellipse cx="130" cy="75" rx="20" ry="30" fill="#ffccee" opacity="0.8" transform="rotate(35 130 75)"/>
      <ellipse cx="15" cy="95" rx="12" ry="18" fill="#ffaadd" opacity="0.7" transform="rotate(-20 15 95)"/>
      <ellipse cx="135" cy="95" rx="12" ry="18" fill="#ffaadd" opacity="0.7" transform="rotate(20 135 95)"/>
      <!-- 날개 광택 -->
      <ellipse cx="14" cy="68" rx="5" ry="9" fill="white" opacity="0.45" transform="rotate(-35 14 68)"/>
      <ellipse cx="136" cy="68" rx="5" ry="9" fill="white" opacity="0.45" transform="rotate(35 136 68)"/>

      <!-- 몸통 (하트형) -->
      <!-- 하트 몸 -->
      <path d="M75 130 C40 110 20 90 20 70 C20 50 35 42 50 48 C58 51 65 58 75 65
               C85 58 92 51 100 48 C115 42 130 50 130 70 C130 90 110 110 75 130Z"
            fill="#ff6699"/>
      <!-- 몸통 하이라이트 -->
      <path d="M50 55 C55 50 65 52 70 60" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

      <!-- 귀 (둥근 토끼귀) -->
      <ellipse cx="52" cy="32" rx="10" ry="18" fill="#ff88aa" transform="rotate(-10 52 32)"/>
      <ellipse cx="98" cy="32" rx="10" ry="18" fill="#ff88aa" transform="rotate(10 98 32)"/>
      <ellipse cx="52" cy="32" rx="6" ry="13" fill="#ffccdd" transform="rotate(-10 52 32)"/>
      <ellipse cx="98" cy="32" rx="6" ry="13" fill="#ffccdd" transform="rotate(10 98 32)"/>

      <!-- 머리 -->
      <ellipse cx="75" cy="65" rx="38" ry="36" fill="#ffeeee"/>

      <!-- 볼터치 -->
      <ellipse cx="48" cy="78" rx="12" ry="7" fill="#ffaacc" opacity="0.55"/>
      <ellipse cx="102" cy="78" rx="12" ry="7" fill="#ffaacc" opacity="0.55"/>

      <!-- 눈썹 -->
      <path d="M56 55 Q62 51 68 54" fill="none" stroke="#ff4488" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M82 54 Q88 51 94 55" fill="none" stroke="#ff4488" stroke-width="2.2" stroke-linecap="round"/>

      <!-- 눈 -->
      <ellipse id="eyeL" cx="62" cy="65" rx="10" ry="11" fill="white"/>
      <ellipse id="eyeR" cx="88" cy="65" rx="10" ry="11" fill="white"/>
      <ellipse cx="62" cy="66" rx="7" ry="8" fill="#220000"/>
      <ellipse cx="88" cy="66" rx="7" ry="8" fill="#220000"/>
      <ellipse cx="62" cy="66" rx="4" ry="5" fill="#ff2266"/>
      <ellipse cx="88" cy="66" rx="4" ry="5" fill="#ff2266"/>
      <!-- 눈 하이라이트 -->
      <circle cx="58" cy="62" r="2.5" fill="white"/>
      <circle cx="84" cy="62" r="2.5" fill="white"/>
      <circle cx="65" cy="69" r="1.2" fill="white" opacity="0.7"/>
      <circle cx="91" cy="69" r="1.2" fill="white" opacity="0.7"/>
      <!-- 속눈썹 -->
      <line x1="52" y1="59" x2="55" y2="63" stroke="#ff2266" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="55" y1="56" x2="58" y2="61" stroke="#ff2266" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="98" y1="59" x2="95" y2="63" stroke="#ff2266" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="95" y1="56" x2="92" y2="61" stroke="#ff2266" stroke-width="1.8" stroke-linecap="round"/>

      <!-- 코 -->
      <ellipse cx="75" cy="75" rx="3.5" ry="2.5" fill="#ffaaaa" opacity="0.7"/>

      <!-- 입 -->
      <path d="M64 82 Q75 91 86 82" fill="none" stroke="#ff4488" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M67 82 Q75 88 83 82" fill="#ff88aa" opacity="0.35"/>

      <!-- 이마 하트 -->
      <path d="M75 45 C75 43 73 41 71 43 C69 45 71 48 75 51 C79 48 81 45 79 43 C77 41 75 43 75 45Z"
            fill="#ff3377"/>

      <!-- 꼬리 하트 -->
      <path d="M75 125 C75 122 72 119 69 122 C66 125 69 129 75 133 C81 129 84 125 81 122 C78 119 75 122 75 125Z"
            fill="#ff88aa"/>

      <!-- 반짝이 -->
      <text x="115" y="45" font-size="13">✨</text>
      <text x="16"  y="42" font-size="11">⭐</text>
      <text x="118" y="110" font-size="10">💗</text>
    </svg>
  </div>

  <h1>💖 캐치! 티니핑 💖</h1>

  <!-- 링 -->
  <div class="ring-wrap">
    <svg width="250" height="250" viewBox="0 0 250 250">
      <defs>
        <linearGradient id="happyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#ff88bb"/>
          <stop offset="100%" stop-color="#ff0066"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg"   cx="125" cy="125" r="107.5"/>
      <circle class="ring-prog" id="ring" cx="125" cy="125" r="107.5"/>
    </svg>
    <div class="time-box">
      <span class="time-icon" id="timeIcon">💖</span>
      <div class="time-main" id="display">00:00:00</div>
      <div class="time-ms"   id="display-ms">.00</div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btns">
    <button id="btn-lap"   onclick="lap()">
      <span class="btn-icon">⭐</span>랩
    </button>
    <button id="btn-start" onclick="toggle()">
      <span class="btn-icon" id="startIcon">▶</span>
      <span id="startLabel">시작</span>
    </button>
    <button id="btn-reset" onclick="reset()">
      <span class="btn-icon">🔄</span>초기화
    </button>
  </div>

  <div class="laps" id="laps"></div>
</div>

<script>
  let startTime=0, elapsed=0, running=false, rafId=null, lapList=[];
  const RING_FULL = 675.4;

  const elMain  = document.getElementById('display');
  const elMs    = document.getElementById('display-ms');
  const elRing  = document.getElementById('ring');
  const btnStart= document.getElementById('btn-start');
  const elIcon  = document.getElementById('startIcon');
  const elLabel = document.getElementById('startLabel');
  const elTime  = document.getElementById('timeIcon');
  const elLaps  = document.getElementById('laps');
  const charSvg = document.getElementById('charSvg');

  /* 배경 파티클 */
  const floats=['💖','💗','✨','⭐','🌸','💝','🎀','🩷'];
  const bgEl=document.getElementById('bgLayer');
  for(let i=0;i<22;i++){
    const d=document.createElement('div');
    d.className='bg-item';
    d.textContent=floats[Math.floor(Math.random()*floats.length)];
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(6+Math.random()*11)+'s';
    d.style.animationDelay=(Math.random()*12)+'s';
    d.style.fontSize=(0.7+Math.random()*1.2)+'rem';
    bgEl.appendChild(d);
  }

  /* 하트 아이콘 루프 */
  const hIcons=['💖','💗','💕','💓','🩷'];
  let hIdx=0;
  setInterval(()=>{ if(running) elTime.textContent=hIcons[hIdx++%hIcons.length]; },450);

  /* 눈 깜빡임 */
  setInterval(()=>{
    const eL=document.getElementById('eyeL'), eR=document.getElementById('eyeR');
    eL.setAttribute('ry','2'); eR.setAttribute('ry','2');
    setTimeout(()=>{ eL.setAttribute('ry','11'); eR.setAttribute('ry','11'); },110);
  },3800);

  function format(ms){
    const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000),
          s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10);
    return { main:`${pad(h)}:${pad(m)}:${pad(s)}`, ms:`.${pad(cs)}` };
  }
  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    elapsed=Date.now()-startTime;
    const {main,ms}=format(elapsed);
    elMain.textContent=main; elMs.textContent=ms;
    elRing.style.strokeDashoffset=RING_FULL-(elapsed/1000%60)/60*RING_FULL;
    rafId=requestAnimationFrame(tick);
  }

  function toggle(){
    if(!running){
      startTime=Date.now()-elapsed; running=true;
      elIcon.textContent='⏸'; elLabel.textContent='정지';
      btnStart.classList.add('running'); tick();
    } else {
      cancelAnimationFrame(rafId); running=false;
      elIcon.textContent='▶'; elLabel.textContent='시작';
      btnStart.classList.remove('running'); elTime.textContent='💖';
    }
    spawnSparkles(btnStart);
  }

  function lap(){
    if(!running) return;
    const totalMs=elapsed;
    const splitMs=elapsed-(lapList.length>0?lapList[lapList.length-1].totalMs:0);
    lapList.push({totalMs,splitMs});
    renderLaps();
    spawnSparkles(document.getElementById('btn-lap'));
  }

  function reset(){
    cancelAnimationFrame(rafId);
    running=false; elapsed=0; startTime=0; lapList=[];
    elMain.textContent='00:00:00'; elMs.textContent='.00';
    elRing.style.strokeDashoffset=RING_FULL;
    elIcon.textContent='▶'; elLabel.textContent='시작';
    elTime.textContent='💖'; btnStart.classList.remove('running');
    elLaps.innerHTML='';
    spawnSparkles(document.getElementById('btn-reset'));
  }

  function renderLaps(){
    const splits=lapList.map(l=>l.splitMs);
    const mn=Math.min(...splits), mx=Math.max(...splits);
    elLaps.innerHTML=lapList.slice().reverse().map((l,ri)=>{
      const i=lapList.length-1-ri;
      const cls=splits.length>1?(l.splitMs===mn?'lap-row best':l.splitMs===mx?'lap-row worst':'lap-row'):'lap-row';
      const medal=splits.length>1&&l.splitMs===mn?'🥇':splits.length>1&&l.splitMs===mx?'🐌':'💖';
      const {main:tm,ms:tms}=format(l.totalMs);
      const {main:sm,ms:sms}=format(l.splitMs);
      return `<div class="${cls}">
        <span class="lap-num">${medal} 랩${i+1}</span>
        <span class="lap-split">${sm}${sms}</span>
        <span class="lap-time">${tm}${tms}</span>
      </div>`;
    }).join('');
  }

  function spawnSparkles(el){
    const r=el.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const sp=['✨','💖','🌸','⭐','💗','🎀'];
    for(let i=0;i<7;i++){
      const s=document.createElement('div');
      s.className='sparkle';
      s.textContent=sp[Math.floor(Math.random()*sp.length)];
      s.style.left=cx+'px'; s.style.top=cy+'px';
      const a=Math.random()*Math.PI*2, d=45+Math.random()*55;
      s.style.setProperty('--dx',Math.cos(a)*d+'px');
      s.style.setProperty('--dy',Math.sin(a)*d+'px');
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),880);
    }
  }
</script>
</body>
</html>
